pre-commit:
  parallel: true
  commands:
    format-changed:
      root: "/"
      run: npx prettier --write {staged_files}
      files: git diff --name-only --cached

pre-push:
  parallel: true
  commands:
    build-app:
      run: >
        npm run build-only || exit 1
    build-storybook:
      run: >
        npm run build-storybook || exit 1
