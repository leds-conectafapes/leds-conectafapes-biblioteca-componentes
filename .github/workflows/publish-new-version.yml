name: Bump Version and Publish

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: "Tipo de versão (patch, minor, major)"
        required: true
        default: "patch"

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Swap README files and commit
        run: |
          mv README.md README-GITHUB.md
          mv README-NPM.md README.md
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add README.md README-GITHUB.md README-NPM.md
          git commit -m "chore: prepare README for npm publish"

      - name: Bump version
        run: |
          npm version ${{ github.event.inputs.version_type }} -m "Release %s [skip ci]"
        env:
          CI: true

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Restore README files
        run: |
          mv README.md README-NPM.md
          mv README-GITHUB.md README.md

      - name: Push version commit and tag
        run: |
          git push origin HEAD --follow-tags
        env:
          GIT_AUTHOR_NAME: github-actions
          GIT_AUTHOR_EMAIL: github-actions@github.com
          GIT_COMMITTER_NAME: github-actions
          GIT_COMMITTER_EMAIL: github-actions@github.com