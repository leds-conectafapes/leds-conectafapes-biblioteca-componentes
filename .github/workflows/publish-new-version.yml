name: Bump Version and Publish

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20.x'
        registry-url: 'https://registry.npmjs.org'
        
    - name: Configure Git
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"

    - name: Reset any uncommitted changes
      run: |
        git reset --hard HEAD
        git clean -fd

    - name: Check Git status
      run: git status
      
    - name: Commit changes if any
      run: |
        git add .
        git commit -m "Committing changes before version bump" || echo "No changes to commit"
        
    - name: Rename README.md to README-GITHUB.md and README-NPM.md to README.md
      run: |
        mv README.md README-GITHUB.md
        mv README-NPM.md README.md
    
    - name: Increment Version
      run: |
        npm version patch -m "Upgrade to %s for new release"
            
    - name: Publish to NPM
      run: npm publish --access public
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

    - name: Restore README files after publish
      run: |
        mv README.md README-NPM.md
        mv README-GITHUB.md README.md
