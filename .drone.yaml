kind: pipeline
type: docker
name: Build

trigger:
  event:
    - push
  branch:
    - develop
    - test

steps:
  - name: build
    image: docker:27.2.0-dind
    privileged: true
    volumes:
      - name: dockersock
        path: /var/run/docker.sock
    commands:
      - docker build -f Dockerfile .
      - echo "Build completed successfully"
services:
  - name: dind
    image: docker:27.1-dind
    privileged: true

volumes:
  - name: dockersock
    host:
      path: /var/run/docker.sock
